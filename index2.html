<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS CINEMA | PREMIUM MOVIE HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .movie-card:hover img { transform: scale(1.1); filter: brightness(30%); transition: 0.5s; }
        .play-btn { opacity: 0; transition: 0.3s; transform: translateY(20px); }
        .movie-card:hover .play-btn { opacity: 1; transform: translateY(0); }
        .nav-blur { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); }
        #player-modal { display: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
        /* Iframe Ad Block Overlay Simulation */
        .iframe-container { position: relative; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <nav class="nav-blur fixed top-0 w-full z-[100] px-6 py-4 flex justify-between items-center border-b border-gray-900">
        <div class="text-3xl font-black text-red-600 tracking-tighter">NEXUS<span class="text-white font-light">CINEMA</span></div>
        <div class="hidden md:flex space-x-8 font-semibold text-sm">
            <a href="#" class="hover:text-red-600 transition" onclick="location.reload()">HOME</a>
            <a href="#" class="hover:text-red-600 transition">MOVIES</a>
            <a href="#" class="hover:text-red-600 transition">TV SHOWS</a>
            <a href="#" class="hover:text-red-600 transition text-red-500 underline">LATEST</a>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative">
                <input id="search-box" type="text" placeholder="Search..." class="bg-gray-900 border border-gray-800 rounded-full py-2 px-10 text-xs focus:outline-none focus:ring-2 focus:ring-red-600 w-48 lg:w-64">
                <i class="fa fa-search absolute left-4 top-2.5 text-gray-500"></i>
            </div>
            <button onclick="searchMovies()" class="bg-red-600 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-red-700 transition shadow-lg shadow-red-600/20">SEARCH</button>
        </div>
    </nav>

    <div id="hero" class="relative h-[85vh] w-full bg-cover bg-center flex items-center p-8 lg:p-24 transition duration-1000">
        <div class="absolute inset-0 bg-gradient-to-r from-black via-black/60 to-transparent"></div>
        <div class="relative z-10 max-w-3xl">
            <span class="bg-red-600 text-[10px] font-bold px-3 py-1 rounded-full mb-4 inline-block">TRENDING NOW</span>
            <h1 id="hero-title" class="text-5xl lg:text-7xl font-extrabold mb-4 leading-tight">Loading...</h1>
            <p id="hero-desc" class="text-gray-400 mb-8 text-sm lg:text-lg line-clamp-3">Discover the latest movies and TV shows from around the world.</p>
            <div class="flex space-x-4">
                <button id="hero-play" class="bg-white text-black px-10 py-3 rounded-md font-bold flex items-center hover:bg-red-600 hover:text-white transition transform hover:scale-105 shadow-xl"><i class="fa fa-play mr-2"></i> WATCH NOW</button>
                <button class="bg-gray-800/80 backdrop-blur-md text-white px-10 py-3 rounded-md font-bold flex items-center hover:bg-gray-700 transition"><i class="fa fa-plus mr-2"></i> MY LIST</button>
            </div>
        </div>
    </div>

    <div class="py-10 px-6 lg:px-12 relative z-10 -mt-20">
        <h2 id="section-title" class="text-2xl font-bold mb-8 flex items-center"><span class="w-1.5 h-8 bg-red-600 mr-4 rounded-full shadow-lg shadow-red-600/50"></span>Trending Movies</h2>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </div>

    <div id="player-modal" class="fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-6xl relative">
            <button onclick="closePlayer()" class="absolute -top-12 right-0 text-white text-4xl hover:text-red-600 transition">&times; CLOSE</button>
            
            <div class="flex gap-2 mb-4 justify-center">
                <button id="srv1" class="bg-red-600 text-[10px] px-4 py-2 rounded font-bold">SERVER 1 (FAST)</button>
                <button id="srv2" class="bg-gray-800 text-[10px] px-4 py-2 rounded font-bold hover:bg-red-600 transition">SERVER 2 (NO ADS)</button>
            </div>

            <div class="aspect-video bg-black rounded-xl overflow-hidden border border-gray-800 shadow-2xl iframe-container">
                <iframe id="video-iframe" src="" 
                        sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-presentation" 
                        class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
            <h3 id="playing-title" class="mt-6 text-xl font-bold text-center text-white italic tracking-widest"></h3>
        </div>
    </div>

    <footer class="py-12 border-t border-gray-900 text-center bg-black">
        <div class="text-2xl font-black text-red-600 mb-4">NEXUS<span class="text-white">CINEMA</span></div>
        <p class="text-gray-500 text-sm italic">Designed for high-end movie streaming experiences.</p>
        <p class="mt-4 text-xs text-gray-700 font-bold">&copy; 2026 Developed by <span class="text-red-800 uppercase tracking-widest">SASIYA MD</span></p>
    </footer>

    <script>
        const API_KEY = 'b598110b0c8a7b5063cbba3798a263a0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/original';

        document.addEventListener('DOMContentLoaded', () => { getTrending(); });

        async function getTrending() {
            const res = await fetch(`${BASE_URL}/trending/movie/day?api_key=${API_KEY}`);
            const data = await res.json();
            const trending = data.results;
            const main = trending[0];
            document.getElementById('hero').style.backgroundImage = `url('${IMG_URL + main.backdrop_path}')`;
            document.getElementById('hero-title').innerText = main.title;
            document.getElementById('hero-desc').innerText = main.overview;
            document.getElementById('hero-play').onclick = () => playMovie(main.id, main.title);
            displayMovies(trending);
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card relative group rounded-xl overflow-hidden cursor-pointer shadow-2xl';
                card.innerHTML = `
                    <img src="${IMG_URL + movie.poster_path}" class="w-full h-[300px] lg:h-[350px] object-cover transition duration-500">
                    <div class="play-btn absolute inset-0 flex flex-col items-center justify-center p-4 bg-black/40">
                        <i class="fa fa-play-circle text-5xl text-white drop-shadow-lg mb-2"></i>
                        <span class="bg-red-600 text-[10px] px-2 py-1 rounded font-bold">PLAY MOVIE</span>
                    </div>
                    <div class="absolute bottom-0 p-4 w-full bg-gradient-to-t from-black text-center">
                        <p class="font-bold text-sm truncate uppercase tracking-tighter">${movie.title}</p>
                        <div class="flex justify-center items-center space-x-2 mt-1">
                            <span class="text-[10px] text-yellow-500 font-bold"><i class="fa fa-star"></i> ${movie.vote_average.toFixed(1)}</span>
                            <span class="text-[10px] text-gray-400 font-bold border border-gray-800 px-1 rounded">${movie.release_date.split('-')[0]}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => playMovie(movie.id, movie.title);
                grid.appendChild(card);
            });
        }

        async function searchMovies() {
            const query = document.getElementById('search-box').value;
            if(!query) return;
            const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}`);
            const data = await res.json();
            document.getElementById('section-title').innerText = `Results for: ${query}`;
            displayMovies(data.results);
            window.scrollTo({ top: 500, behavior: 'smooth' });
        }

        function playMovie(id, title) {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-iframe');
            
            // Default to Server 1
            iframe.src = `https://vidsrc.me/embed/movie?tmdb=${id}`;
            document.getElementById('playing-title').innerText = `NOW STREAMING: ${title}`;
            
            // Server Switch Logic
            document.getElementById('srv1').onclick = () => {
                iframe.src = `https://vidsrc.me/embed/movie?tmdb=${id}`;
                updateSrvBtn('srv1');
            };
            document.getElementById('srv2').onclick = () => {
                iframe.src = `https://vidsrc.to/embed/movie/${id}`;
                updateSrvBtn('srv2');
            };

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function updateSrvBtn(activeId) {
            document.getElementById('srv1').className = activeId === 'srv1' ? 'bg-red-600 text-[10px] px-4 py-2 rounded font-bold' : 'bg-gray-800 text-[10px] px-4 py-2 rounded font-bold';
            document.getElementById('srv2').className = activeId === 'srv2' ? 'bg-red-600 text-[10px] px-4 py-2 rounded font-bold' : 'bg-gray-800 text-[10px] px-4 py-2 rounded font-bold';
        }

        function closePlayer() {
            const modal = document.getElementById('player-modal');
            document.getElementById('video-iframe').src = '';
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
